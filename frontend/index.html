<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex items-center justify-center p-4">

    <!-- Name Entry Window (Login Modal) -->
    <div id="loginModal" class="absolute inset-0 bg-slate-900 z-50 flex items-center justify-center">
        <div class="bg-slate-800 p-6 rounded-lg shadow-xl text-center">
            <h2 class="text-xl font-bold mb-4">Identify Yourself</h2>
            <input type="text" id="usernameInput" class="w-full bg-slate-700 p-2 rounded mb-4" placeholder="Your name...">
            <button class="bg-blue-600 px-4 py-2 rounded font-bold w-full">Join Chat</button>
        </div>
    </div>

    <!-- Main Container (Split into Contacts and Chat) -->
    <div class="w-full max-w-4xl bg-slate-800 rounded-lg shadow-xl flex h-[35rem] hidden" id="mainApp">
        
        <!-- Left Panel: Users List -->
        <div class="w-1/3 border-r border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-700 font-bold bg-slate-800 rounded-tl-lg">
                Contacts
            </div>
            <div id="usersList" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- JS will add users here -->
            </div>
        </div>

        <!-- Right Panel: Chat -->
        <div class="w-2/3 flex flex-col">
            <div class="p-4 border-b border-slate-700 font-bold flex justify-between items-center bg-slate-800 rounded-tr-lg">
                <span id="chatWithTitle">Select a contact</span>
                <span id="status" class="text-red-500 text-sm">Disconnected</span>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2">
                <!-- Messages -->
            </div>

            <div class="p-4 border-t border-slate-700 flex gap-2">
                <input type="text" id="messageInput" class="flex-1 bg-slate-700 rounded px-3 py-2 outline-none" placeholder="Write a message..." disabled>
                <button id="sendBtn" class="bg-slate-600 px-4 py-2 rounded font-semibold text-slate-400" disabled>
                    Send
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/app.js"></script>
</body>
</html>
