<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col items-center justify-center p-4">

    <!-- Main chat container -->
    <div class="w-full max-w-md bg-slate-800 rounded-lg shadow-xl flex flex-col h-[30rem]">
        
        <!-- Header -->
        <div class="p-4 border-b border-slate-700 font-bold text-center">
            Чат (Эхо-тест)
            <span id="status" class="text-red-500 text-sm ml-2">Отключен</span>
        </div>

        <!-- Container for messages -->
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2">
            <!-- Messages will apear here -->
        </div>

        <!-- Input field -->
        <div class="p-4 border-t border-slate-700 flex gap-2">
            <input type="text" id="messageInput" 
                   class="flex-1 bg-slate-700 text-white rounded px-3 py-2 outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Введите сообщение...">
            <button onclick="sendMessage()" 
                    class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded font-semibold transition-colors">
                Отправить
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
