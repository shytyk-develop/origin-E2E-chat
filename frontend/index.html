<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OriginHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex items-center justify-center p-4">

    <div id="page-login" class="route-page w-full max-w-sm bg-slate-800 p-6 rounded-lg shadow-xl text-center">
        <h2 class="text-2xl font-bold mb-6">OriginHub</h2>
        
        <input type="text" id="usernameInput" class="w-full bg-slate-700 p-2 rounded mb-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Username">
        <input type="password" id="passwordInput" class="w-full bg-slate-700 p-2 rounded mb-4 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Password">
        
        <div class="flex gap-2">
            <button id="btnLogin" class="bg-blue-600 px-4 py-2 rounded font-bold w-1/2 hover:bg-blue-500 transition">Log In</button>
            <button id="btnRegister" class="bg-slate-600 px-4 py-2 rounded font-bold w-1/2 hover:bg-slate-500 transition">Register</button>
        </div>
        
        <div id="authError" class="text-red-400 text-sm mt-4 hidden"></div>
    </div>

    <div id="page-chat" class="route-page w-full max-w-4xl bg-slate-800 rounded-lg shadow-xl flex h-[35rem] hidden">
        
        <div class="w-1/3 border-r border-slate-700 flex flex-col">
            <div class="p-4 border-b border-slate-700 font-bold bg-slate-800 rounded-tl-lg">
                Contacts
            </div>
            <div id="usersList" class="flex-1 overflow-y-auto p-2 space-y-1">
                </div>
        </div>

        <div class="w-2/3 flex flex-col relative">
            <div class="p-4 border-b border-slate-700 font-bold flex justify-between items-center bg-slate-800 rounded-tr-lg">
                <span id="chatWithTitle">Select a contact</span>
                <span id="status" class="text-red-500 text-sm">Disconnected</span>
            </div>

            <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2">
                </div>

            <div id="chat-welcome" class="absolute inset-0 bg-slate-800 flex items-center justify-center top-[60px] bottom-[73px] z-10">
                <p class="text-slate-400">Select a chat to start messaging</p>
            </div>

            <div class="p-4 border-t border-slate-700 flex gap-2">
                <input type="text" id="messageInput" class="flex-1 bg-slate-700 rounded px-3 py-2 outline-none" placeholder="Write a message..." disabled>
                <button id="sendBtn" class="bg-slate-600 px-4 py-2 rounded font-semibold text-slate-400" disabled>
                    Send
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
